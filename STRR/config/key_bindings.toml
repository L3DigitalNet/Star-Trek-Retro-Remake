# Star Trek Retro Remake - Key Bindings Configuration
#
# This file defines all keyboard, mouse, and gamepad controls for the game.
# Users can modify these bindings to customize their control scheme.
#
# Author: Star Trek Retro Remake Development Team
# Date Created: 10-29-2025
# License: Open Source

# ============================================================================
# KEYBOARD CONTROLS
# ============================================================================

[keyboard.movement]
move_up = "w"              # Move ship/cursor up
move_down = "s"            # Move ship/cursor down
move_left = "a"            # Move ship/cursor left
move_right = "d"           # Move ship/cursor right
move_up_z = "q"            # Move up in z-level (space layer)
move_down_z = "e"          # Move down in z-level (space layer)

[keyboard.combat]
fire_phasers = "space"     # Fire phaser arrays
fire_torpedoes = "t"       # Launch photon torpedoes
shields_toggle = "shift"   # Raise/lower shields

[keyboard.systems]
sensors_toggle = "r"       # Toggle sensor mode (passive/active)

[keyboard.interface]
pause = "p"                # Pause/unpause game
menu = "escape"            # Open main menu
next_turn = "enter"        # End current turn
save_game = "f5"           # Quick save game
load_game = "f9"           # Quick load game

[keyboard.view]
zoom_in = "plus"           # Zoom in on sector map
zoom_out = "minus"         # Zoom out on sector map

# ============================================================================
# MOUSE CONTROLS
# ============================================================================

[mouse]
primary_action = "left_click"      # Select/confirm actions
secondary_action = "right_click"   # Cancel/secondary actions
context_menu = "right_click"       # Show context menu
pan_view = "middle_drag"           # Pan camera view
zoom = "wheel"                     # Zoom in/out with mouse wheel

# ============================================================================
# GAMEPAD CONTROLS
# ============================================================================

[gamepad]
enabled = false            # Enable gamepad support
deadzone = 0.15           # Analog stick deadzone (0.0 - 1.0)