# Star Trek Retro Remake - Game Settings Configuration
#
# This file contains all game configuration settings including display,
# gameplay, audio, controls, and graphics options.
#
# Author: Star Trek Retro Remake Development Team
# Date Created: 10-29-2025
# License: Open Source

[display]
window_width = 1024     # Default window width in pixels
window_height = 768     # Default window height in pixels
fullscreen = false      # Start in windowed mode by default
vsync = true           # Enable vertical sync to prevent screen tearing
fps_limit = 60         # Target framerate (0 = unlimited)
update_timer_ms = 16   # UI update timer in milliseconds (~60 FPS)

# Game surface dimensions
game_surface_width = 1280   # Game rendering surface width
game_surface_height = 900   # Game rendering surface height

[game]
difficulty = "normal"           # Game difficulty: easy, normal, hard, expert
auto_save = true               # Automatically save game progress
auto_save_interval = 300       # Auto-save interval in seconds (5 minutes)
turn_timer = 30                # Turn time limit in seconds (0 = unlimited)

[game.grid_size]
galaxy = [10, 10]              # Galaxy map dimensions [width, height]
sector = [20, 20, 5]           # Sector map dimensions [width, height, z-levels]

[game.combat]
# Weapon system settings
weapon_firing_arc = 270        # Default firing arc in degrees
weapon_accuracy_base = 0.85    # Base weapon accuracy (0.0 - 1.0)
weapon_range_penalty = 0.4     # Accuracy penalty at max range (0.0 - 1.0)
critical_hit_chance = 0.1      # Chance of critical hit (0.0 - 1.0)
critical_hit_multiplier = 1.5  # Damage multiplier for critical hits

# Shield system settings
shield_energy_effectiveness = 0.85  # Shield effectiveness vs energy weapons (0.0 - 1.0)
shield_kinetic_effectiveness = 0.65 # Shield effectiveness vs kinetic weapons (0.0 - 1.0)
shield_min_absorption = 0.1    # Minimum damage absorbed by active shields (0.0 - 1.0)

# AI behavior settings
ai_patrol_radius = 5           # Patrol radius in grid cells
ai_flee_threshold = 30.0       # Hull integrity % to trigger flee behavior
ai_enemy_cache_turns = 3       # Turns to cache enemy list before refresh

[audio]
master_volume = 0.8            # Master audio volume (0.0 - 1.0)
music_volume = 0.6             # Background music volume
sfx_volume = 0.7               # Sound effects volume
ui_volume = 0.5                # UI interaction sounds volume

[controls]
mouse_sensitivity = 1.0         # Mouse sensitivity multiplier
keyboard_repeat_delay = 250     # Key repeat delay in milliseconds
keyboard_repeat_rate = 30       # Key repeat rate in Hz

[graphics]
grid_lines = true              # Show sector grid lines
show_coordinates = true        # Display grid coordinates
animation_speed = 1.0          # Animation speed multiplier (0.5 = slower, 2.0 = faster)
particle_effects = true        # Enable particle effects for weapons/explosions

# UI colors (RGB values 0-255)
selection_highlight_color = [0, 255, 0]     # Green for cell selection
default_entity_color = [255, 255, 0]        # Yellow for generic entities
text_color = [255, 255, 255]                # White for text rendering
current_layer_alpha = 255                   # Full opacity for current z-level
adjacent_layer_alpha = 80                   # Transparency for adjacent z-levels

# Dialog dimensions
min_dialog_width = 300         # Minimum width for dialogs in pixels