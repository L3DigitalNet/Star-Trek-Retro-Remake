# Mission Templates Configuration
# Star Trek Retro Remake - Mission System

# Mission templates define the base structure for different mission types.
# Actual missions are generated from these templates with scaled difficulty.

[missions.patrol]
name = "Patrol Mission"
description = "Scan designated waypoints in the sector and report any anomalies or hostile activity."
mission_type = "PATROL"

[[missions.patrol.objectives]]
description = "Scan waypoint coordinates"
type = "scan_waypoint"
target_count = 3

[[missions.patrol.objectives]]
description = "Report findings to Starfleet Command"
type = "report_data"
target_count = 1

[missions.patrol.rewards]
reputation = 10
supplies = 5
spare_parts = 0
experience = 50


[missions.combat]
name = "Combat Mission"
description = "Engage and defeat enemy vessels threatening Federation space in this sector."
mission_type = "COMBAT"

[[missions.combat.objectives]]
description = "Destroy enemy ships"
type = "destroy_enemy"
target_count = 2

[[missions.combat.objectives]]
description = "Secure the sector"
type = "clear_sector"
target_count = 1

[missions.combat.rewards]
reputation = 20
supplies = 0
spare_parts = 10
experience = 100


[missions.escort]
name = "Escort Mission"
