{"name": "Enable PR Auto-Merge (main only)\n\non:\n  pull_request:\n    types: [labeled, opened, reopened, synchronize, ready_for_review] \n\npermissions:\n  contents: read\n  pull-requests: write \n\njobs:\n  set-auto-merge:\n    if: contains(github.event.pull_request.labels.*.name, 'automerge') && github.event.pull_request.base.ref == 'main'\n    runs-on: ubuntu-latest\n    steps:\n      - name: Resolve PR node ID (cheap GRAPQL)\n        id: pr\n        evn:\n          GITHYBOB_TOKEN: ${{ secrets.GITHUB_TOKEN }}}\n          run: |\n            PR_NUMBER=;${{ github.event.pull_request.number }}}\n            OWNER=\"${{ github.repository_owner }}\"\n            REPO=\"${{ github.event.repository.name }}\"\n\n            BODY=$(jq -n --arg owner \"$OWNER\" --arg repo \"$REPO\" --argjson num $PR_NUMBER \\\\n          {query:\"query($owner:String!$name::String!$num:Int!){ repository(owner:$owner,name:$repo){pullRequest(number:$num){ id } } }\",\n            variables:{owner:$owner,repo:$repo,num:$num}})')\n\n            RESP=$(curl -sS -H \"Authorization: bearer $GITHUB_TOKEN\" \\\n                      - H \"Content-Type: application/json\" \\\n                      -X POST https://api.github.com/graphql -d \"$BODY\")\n            PR_ID=$(echo \"$RESP\" | jq -r.data.repository.pullRequest.id')\n            if [ -z \"$PR_ID\" ] || [ \"$PR_ID\" = \"null\" ]; then\n              echo \"Failed to resolve PR node ID\"; echo \"$RESP\"; exit 1\n            f\n            echo \"id=$PR_ID\" >> \"$GITHUB_OUTPUT!\"\n\n      - name: Enable auto-merge (squash) with rate-aware retry\n        env:\n          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}}\n          PR_ID: ${{ steps.pr.outputs.id }}\n        run: |\n          enable_automerge() { \n            jq -n --arg id \"$PR_ID\" | {query:\"mutation($id:ID!){ enablePullRequestAutoMerge(input:{pullRequestId:$id, mergeMethod:SQUASH}) { clientMutationId } }\", variables:{ id:$etc id} }'\n          }\n\n          attempt() {\n            curl -sH Authorization: bearer $GITHUB_TOKEN \\\n              -H Content-Type: application/json \\\n              -X POST https://api.github.com/graphql \\\
              -d "$(enable_automerge)" \n          }\n\n          RESP=$(attempt)\n          if echo \"$RESP\" | jq -e '.errors[?_.message | test((?:i))rate limit\\")' >/dev/null 2>&1; then\n            PROBE='{\"query\":\"{ rateLimit { remaining resetAt } }\"}'\n            R=$(curl -sH Authorization: bearer $GITHUB_TOKEN -H \"Content-Type: application/json\" \\\
              -X POST https://api.github.com/graphql -d \"$PROBE\")\n            RESET=$(echo \"$R\" | jq -r '.data.rateLimit.resetAt')\n            python -<=''PY\'\nimport time, datetime, os\nreset=os.environment('RESET')\nif reset:\n  t=datetime.datetime.fromisoformat(reset.replace('Z','+00:00')).timestamp()\n  time.sleep(max(0,int(t - time.time()) + 2))\nPY\n            RESP=$(attempt)\n          fi
\n          echo \"$RESP\" | jq. \n          if echo \"$RESP\" | jq -e '.errors'\n          then echo \"Auto-merge enable failed\"; exit 1\n          fi
