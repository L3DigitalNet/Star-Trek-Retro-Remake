name: Doc Drift Detection

# DISABLED: This workflow requires a local Ollama instance (127.0.0.1:11434)
# which was available on the self-hosted runner. Needs reworking to use
# LiteLLM API or another approach before re-enabling.
on:
  workflow_dispatch:  # manual trigger only

jobs:
  doc-drift:
    name: Detect documentation drift
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Ollama is reachable
        run: |
          curl -sf http://127.0.0.1:11434/api/tags > /dev/null || {
            echo "Ollama not available — skipping analysis"
            exit 1
          }
          echo "Ollama is up"

      - name: Run doc drift analysis
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python3 .github/scripts/doc_drift.py
