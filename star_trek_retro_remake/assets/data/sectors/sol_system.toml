# Star Trek Retro Remake - Sol System Sector Data
#
# Sector definition for the Sol System, home to Earth and Starfleet Command.
# This demonstrates the sector data format using TOML array of tables.
#
# Author: Star Trek Retro Remake Development Team
# Date Created: 10-29-2025
# License: Open Source

# ============================================================================
# SECTOR METADATA
# ============================================================================

sector_id = "sol_system"
name = "Sol System"
coordinates = [0, 0]           # Galaxy map coordinates
sector_type = "federation"     # Controlling faction
grid_size = [20, 20, 5]       # [width, height, z_levels]
description = "The Sol System, home to Earth and Starfleet Command."

# ============================================================================
# SECTOR OBJECTS
# ============================================================================

# Earth Spacedock - Federation starbase
[[objects]]
type = "starbase"
name = "Earth Spacedock"
position = [10, 10, 2]        # [x, y, z] coordinates
services = ["repair", "resupply", "training"]
faction = "federation"

# Earth - Home planet of humanity
[[objects]]
type = "planet"
name = "Earth"
position = [10, 10, 1]
description = "Home planet of humanity and capital of the Federation"

# Asteroid Belt - Navigation hazard
[[objects]]
type = "obstacle"
name = "Asteroid Belt"
positions = [                 # Multiple positions for large obstacle
    [15, 8, 1],
    [16, 8, 1],
    [17, 8, 1],
    [15, 9, 1],
    [16, 9, 1],
    [17, 9, 1]
]

# ============================================================================
# ENVIRONMENTAL EFFECTS
# ============================================================================

[environmental_effects.solar_radiation]
positions = [
    [10, 10, 1],              # Around Earth
    [10, 10, 2]               # Around Earth Spacedock
]
effect = "increased_energy_regeneration"

# ============================================================================
# STARTING ENTITIES
# ============================================================================

# USS Reliant - Patrol ship
[[starting_entities]]
type = "npc_ship"
ship_class = "miranda"
name = "USS Reliant"
position = [8, 12, 2]
faction = "federation"
behavior = "patrol"